# Grafana datasource provisioning for the docker-compose demo stack.
# Points Grafana at the Prometheus service that scrapes nsr_exporter.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s
