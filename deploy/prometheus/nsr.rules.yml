# Alert rules for nsr_exporter. Expressions use metrics emitted by the exporter.
# NOTE: nsr_job_bytes_per_second and nsr_session_bytes are already per-second gauges
# or instantaneous gauges — aggregate with sum()/avg(), NEVER rate().
groups:
  - name: nsr-health
    rules:
      - alert: NsrTargetDown
        expr: nsr_up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "NetWorker system unreachable ({{ $labels.system }})"
          description: "nsr_up is 0 for system {{ $labels.system }} for over 5 minutes — scrape or API connection failed."

      - alert: NsrActiveAlertsCritical
        # priority enum casing is appliance-dependent; case-insensitive match is robust.
        expr: nsr_alerts_active{priority=~"(?i)critical"} > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "NetWorker has Critical alerts ({{ $labels.system }})"
          description: "{{ $value }} Critical alert(s) active on NetWorker system {{ $labels.system }}. Check the Alerts dashboard."

      - alert: NsrActiveAlertsWarning
        expr: nsr_alerts_active{priority=~"(?i)warning"} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NetWorker has Warning alerts ({{ $labels.system }})"
          description: "{{ $value }} Warning alert(s) active on NetWorker system {{ $labels.system }} for over 5 minutes."

  - name: nsr-capacity
    rules:
      - alert: NsrDataDomainCapacityHigh
        expr: >
          nsr_datadomain_capacity_used_bytes
          / clamp_min(nsr_datadomain_capacity_total_bytes, 1) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Data Domain capacity above 85% ({{ $labels.system }}/{{ $labels.dd_name }})"
          description: >
            Data Domain {{ $labels.dd_name }} on system {{ $labels.system }} is
            {{ $value | humanizePercentage }} physically used.

      - alert: NsrDataDomainCapacityCritical
        expr: >
          nsr_datadomain_capacity_used_bytes
          / clamp_min(nsr_datadomain_capacity_total_bytes, 1) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Data Domain capacity above 95% ({{ $labels.system }}/{{ $labels.dd_name }})"
          description: >
            Data Domain {{ $labels.dd_name }} on system {{ $labels.system }} is
            {{ $value | humanizePercentage }} physically used — immediate action required.

  - name: nsr-jobs
    rules:
      - alert: NsrJobFailed
        expr: nsr_job_status{completion_status="Failed"} == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "NetWorker backup job failed ({{ $labels.system }})"
          description: >
            Job {{ $labels.job_name }} (id={{ $labels.job_id }}) on client {{ $labels.client }}
            of system {{ $labels.system }} has completion_status=Failed.

      - alert: NsrNoActiveSessions
        expr: sum by (system) (nsr_active_sessions) == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "No active backup sessions ({{ $labels.system }})"
          description: >
            No active sessions on NetWorker system {{ $labels.system }} for over 30 minutes.
            Expected during maintenance windows; investigate otherwise.

  - name: nsr-devices
    rules:
      - alert: NsrDeviceNotEnabled
        # Device.status enum is Enabled/Disabled/Service; anything but Enabled is degraded.
        expr: nsr_device_info{status!="Enabled"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NetWorker backup device not enabled ({{ $labels.system }}/{{ $labels.device_name }})"
          description: >
            Device {{ $labels.device_name }} (media_type={{ $labels.media_type }}) on system
            {{ $labels.system }} has status={{ $labels.status }} (not Enabled) for over 5 minutes.

      - alert: NsrStorageNodeDisabled
        expr: nsr_storagenode_info{enabled!="true"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NetWorker storage node not enabled ({{ $labels.system }}/{{ $labels.node }})"
          description: >
            Storage node {{ $labels.node }} on system {{ $labels.system }} has
            enabled={{ $labels.enabled }} — expected true.

  - name: nsr-protection
    rules:
      - alert: NsrPolicyDisabled
        expr: nsr_policy_enabled == 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "NetWorker protection policy disabled ({{ $labels.system }}/{{ $labels.policy }})"
          description: >
            Protection policy {{ $labels.policy }} on system {{ $labels.system }} is
            disabled (nsr_policy_enabled=0). Clients covered by this policy are not protected.
