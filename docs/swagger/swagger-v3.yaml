        type: string
      targetVmUserId:
        description: This attribute specifies the user ID of target VM.
        type: string
      targetVmUserPassword:
        description: This attribute specifies the user password of target VM.
        type: string
      uninstallFlrAgent:
        type: boolean
      vProxy:
        description: This attribute specifies the IP address of vProxy appliance.
        type: string
  BitRate:
    type: object
    properties:
      unit:
        description: This attribute specifies the unit of bit rate.
        type: string
        enum:
          - Byte/s
          - KB/s
      value:
        type: integer
        format: int64
  Client:
    type: object
    properties:
      aliases:
        description: 'This attribute specifies aliases for the client machine that queries can match. If this list is empty, match on client name alone.'
        type: array
        items:
          type: string
      applicationInformation:
        description: 'This attribute contains client application specific information.<br><br>For example: In case of Microsoft SQL VDI, the application information could be ["NSR_PS_DEBUG_LEVEL=0","NSR_CONSISTENCY_CHECKS=FALSE"]. Here the NSR_PS_DEBUG_LEVEL option specifies the verbosity level of the logs and "NSR_CONSISTENCY_CHECKS=FALSE" option disables the consistency check for all databases in the SQL VDI instance. <br><br>These options are application specific and are documented in the respective application user guides.'
        type: array
        items:
          type: string
      archiveServicesEnabled:
        type: boolean
        description: This attribute determines whether archive services are available for the client.
      autoSelectStorageNodeEnabled:
        type: boolean
        description: 'This attribute specifies whether the client can override the attributes of the backup target disks, storage nodes, and recover storage nodes.'
      backupCommand:
        type: string
        description: 'This attribute specifies the remote command to run to back up data for this client and save sets. The value must not include the path to the command.<br><br>You can specify the command with specific options, for example, send verbose backup information. Alternately you can customize the backups by creating additional programs (scripts) that affect the way the NetWorker server backs up the data as in pre and post backup processing. The program must start with the prefix ''save'' or ''nsr'' and must be placed in the bin directory of the NetWorker installation directory on the NetWorker client.'
      backupRenamedDirectoriesEnabled:
        type: boolean
        description: 'This attribute specifies whether to include renamed directories in an incremental backup. However, the renamed directory must be explicitly listed in the save set attribute. <br><br>By default, if the name of a directory changes after a full backup, but no files or subfolders in the directory change, NetWorker will not include the renamed directory in subsequent incremental backups.'
      backupTargetDisks:
        type: array
        items:
          type: string
        description: 'This is an ordered list of disk devices for the client to use when saving the data, without refering to the storage node lists. The devices can be either advanced file type or Data Domain devices. This attribute does not apply to the client of the NetWorker server.'
      backupType:
        type: string
        description: 'This attribute specifies the client backup type as FileSystem, vProxy, SQL Server, Microsoft Exchange Server, or a similar value.'
      backupConfig:
        $ref: '#/definitions/BackupConfig'
        type: object
        description: This attribute specifies the specific backup configurations for the client. The configuration parameters will depend on the backupType.
      blockBasedBackup:
        type: boolean
        default: false
        description: Select this attribute to enable the image backups. Refer to the NetWorker Administration Guide for additional information about configuring block based backups.
      centralizedLogsCollection:
        type: boolean
        description: 'This attribute enables or disables local logs collections into the centralized logs storage for this client. By default, it is enabled.'
      checkPointGranularity:
        type: string
        description: 'This attribute specifies whether to restart the backup from the point of failure at the directory or file level. The defualt value is Directory. <br><br>Directory - After each directory is saved, the data is committed to the media and index database. If a directory contains a large number of entries, intermediate checkpoints are created. <br><br>File - Use this option only for save sets with a few large files. Committing every file to the index and the media database is time consuming. Performance degradation may occur for backups that contain many small files.'
        enum:
          - Directory
          - File
      checkpointEnabled:
        type: boolean
        default: false
        description: 'This attribute enables the support for checkpoint restart during scheduled backups. The save program performs a backup in an ordered manner and keeps track of the files saved. If save fails, it can be restarted from the point of interruption (file or directory). The ordering of the filesystems during backup may cause performance impact.'
      clientId:
        type: string
        description: This attribute specifies the client's identifier and cannot be changed.
      clientDirectEnabled:
        type: boolean
        description: This attribute indicates if this client is enabled to bypass the storage node and write directly to the target disk device during a scheduled backup of the client.
      clientLevel:
        type: boolean
        default: false
        description: This attribute assigns the backup level determination to the client application.
      clientOsType:
        description: This attribute specifies the client OS type.
        type: string
      clientState:
        type: string
        enum:
          - active
          - retired
          - decommissioned
          - migrated
          - scanned
          - replicated
        description: 'This attribute specifies the state of the client as: <br> active - indicates that the client is active and protected.<br> retired - indicates that the client is no longer active and does not need to be protected. However, the indices of the client are still present with the NetWorker. <br> decommissioned - indicates client is no longer active, no more protected and no indices are present with the NetWorker.'
      comment:
        type: string
        description: This attribute specifies any user-defined description of this client or other explanatory remarks.
      cpu:
        type: integer
        description: This attribute specifies the number of processors in the client machine.
      crossMountPointsEnabled:
        type: boolean
        description: This attribute specifies whether the save is allowed to cross-mount points while scheduled backups.
      dataDomainBackup:
        type: boolean
        description: This attribute specifies whether the backup destination for this client is a Data Domain device.
      dataDomainInterface:
        type: string
        description: This attribute specifies the client interface over which a Client Direct backup to a Data Domain device should occur. The default value is IP. This attribute has meaning only when the Data Domain Backup and Client Direct attributes are enabled.
        enum:
          - Any
          - IP
          - Fibre Channel
      directive:
        type: string
        description: This attribute can be used to specify the directive for the client. The choices are defined by the set of directives available under /directives.
      disableIPV6:
        type: boolean
        default: false
        description: This attribute specifies whether to disable IPv6 for the NDMP client.
      enablerInUse:
        type: boolean
        description: 'This attribute indicates if this client is using up a license count.When a client connects successfully to a server, the value is set to true'
      executablePath:
        type: string
        description: This attribute specifies the path to the NetWorker executables on this client.
      fileInactivityAlertThreshold:
        type: integer
        description: 'This attribute specifies the percentage of space occupied by inactive files, exceeding which will generate a notification. A value of zero indicates that no alert will be sent for this client.'
      fileInactivityThreshold:
        type: integer
        description: This attribute specifies the number of days a file has not been accessed before it is counted as inactive. A value of zero indicates that no inactivity statistics are collected for this client.
      hardLinks:
        type: boolean
        default: false
        description: This attribute specifies whether hard link processing is enabled on the Windows client.
      hostname:
        type: string
        description: This attribute specifies the hostname of the NetWorker client.
      indexBackupContent:
        type: boolean
        default: false
        description: This attribute specifies index files and directories on the snapshot.
      indexMessage:
        type: string
        description: This attribute contains the resulting message of an index purge or compress operation
      indexOperation:
        type: string
        description: This attribute allows an administrator to initiate actions on a client's on-line file index
        enum:
          - Idle
          - ReclaimingSpace
          - CrossChecking
          - PurgingOldestCycle
      indexOperationStart:
        type: string
        format: date-time
        description: This attribute contains the time that a compress or purge operation was started.
      indexPath:
        type: string
        description: 'This attribute is used to allow the NetWorker administrator to balance NetWorker online file index disk utilization across multiple disk partitions. If set, this attribute contains the full path to the directory containing the clients online file index.'
      indexProgress:
        type: integer
        description: This attribute contains the number of records processed during a compress or purge operation
      indexSaveset:
        type: string
        description: This attribute specifies the client file index save set to purge when the index operation is set to purging oldest cycle
      jobControl:
        type: array
        items:
          type: string
        description: This attribute is intended to be used with custom backup scripts. It controls how savegrp and nsrjobd interpret the end of a job and its status.
      licensedApplications:
        type: string
        description: This attribute contains names of the licensed applications which the client utilizes.
      licensedPSPs:
        type: string
        description: This attribute contains names of the licensed Snapshot Management Platforms which the client utilizes
      links:
        type: array
        items:
          $ref: '#/definitions/Link'
      nasDevice:
        type: boolean
        default: false
        description: This attribute specifies whether this client is a NAS device.
      nasDeviceManagementName:
        type: string
        description: 'In NAS device configurations, this attribute specifies the management name of the device.'
      nasFileAccessPassword:
        type: string
        description: 'this password is used to access the file services on a nas device. if a password is specified, then the nas file server user attribute for the client resource must also be defined. each instance of a client can have a different password. this field is only used with windows clients. this field is ignored with other client types.'
      nasFileAccessUser:
        type: string
        description: This user accesses the file services on a NAS device. Each instance of a client can have a different value for the NAS management user. This field is only used with Windows clients. This field is ignored with other client types.
      nasManagementPassword:
        type: string
        description: 'This password is used to perform management actions on a NAS device. If a password is given, then the ''''NAS management user'''' attribute for the client resource must also be defined. Each instance of a client can have a different password.'
      nasManagementUser:
        type: string
        description: The user as which to run remote management commands on this NAS device. Each instance of a client can have a different value for the ''NAS management user''.
      ndmp:
        type: boolean
        default: false
        description: This attribute indicates whether the client is a NDMP client.
      ndmpArrayName:
        type: string
        description: 'In NDMP NAS array configurations, the logical name assigned to the array.'
      ndmpMultiStreamsEnabled:
        type: boolean
      ndmpLogSuccessfulFileRecov:
        type: boolean
        description: This attributes specifies whether the logging shows the recovered files in the log file.
      ndmpVendorInformation:
        type: array
        items:
          type: string
          description: This attribute contains NDMP client vendor information.
      networkerVersion:
        type: string
        description: 'This attribute contains the NetWorker version that is running on the client machine. By default, this field is blank. This attribute is updated when the backup is performed.'
      os:
        description: This attribute specifies the operating system of client.
        type: string
      ownerNotification:
        type: string
        description: This attribute specifies a notification action to send the contents of status messages to the owner/primary user of a client (e.g. savegrp completion messages).
      parallelSaveStreamsPerSaveSet:
        type: boolean
        default: false
        description: This attribute specifies whether to enable Parallel Save Streams(PSS). Enabling PSS results in significant performance improvements due to save set aggregation.
      parallelism:
        type: integer
        format: int32
        description: This attribute specifies the number of data streams that a client can use simultaneously during backup.
      password:
        type: string
        description: 'The commands save and savefs use the password to gain access to the files being backed up, and other backup commands may use it to access application data. If a password is given, then the remote user attribute for the client resource must also be defined. This attribute is not used for UNIX file system clients. Each instance of a client can have a different password.'
      physicalClientParallelismEnabled:
        type: boolean
        description: This attribute specifies whether to override the client parallelism and use the physical client's parallelism.
      physicalHost:
        type: string
        description: 'This attribute specifies the physical hostname, if this resource is for a virtual client. The hostname does not not need to be fully qualified, but must be less than 64 bytes. All clients that share the same physical host must use the same name. Do not mix the name formats, such as short, FQDN, and IP address.'
      pool:
        type: string
        description: This attribute specifies the media pool used for data target selection during a scheduled backup of the save sets specified in this client.
      postCommand:
        type: string
        description: The command that is specified here runs after the save sets are completed for this client. The value must not include a path and must start with the prefix 'save' or 'nsr'.
      preCommand:
        type: string
        description: The command that is specified here runs before the save sets for this client. The value must not include a path and must start with the prefix 'save' or 'nsr'.
      prepolicyGroup:
        type: array
        items:
          type: string
        description: This attribute specifies the list of groups of which the client was a member before the policy was upgraded.
      priority:
        type: string
        description: 'This attribute specifies the priority for the client. During a backup operation, the NetWorker server contacts the client with the lowest priority value first. The valid range is 1 to 1000. If you do not specify a priority here, then the backup order is random. The default value is 500.'
      probeResourceName:
        type: string
        description: 'This attribute specifies the probe resource name, so that probe is initiated against the NetWorker client before the backup begins.'
      protectionGroups:
        type: array
        items:
          type: string
          description: The groups of this client for workflow runs. The choices are defined by the set of existing groups.
      recoverStorageNodes:
        type: array
        items:
          type: string
        description: This attribute is an ordered list of storage nodes for the client to use when recovering its data.
      remoteAccessUsers:
        type: array
        items:
          type: string
        description: 'A list of remote users that are allowed to recover this client''s files. If empty, only users logged into this machine are valid. Examples: sam@jupiter or user=sam,host=jupiter (user sam on machine jupiter), group=wheel,host=jupiter (any user in group wheel on host jupiter), jupiter or host=jupiter (any user on machine jupiter). Warning: If using the restricted data zones (RDZ)s feature it is possible to give access to someone not explicitly in the associated restricted data zone (RDZ). Use caution with wildcard characters.'
      remoteUser:
        type: string
        description: The user that runs remote commands on this client or accesses the application-specific data. Each instance of a client can have a different value for the 'remote user'.
      resourceId:
        $ref: '#/definitions/ResourceId'
      retentionPolicy:
        type: string
        description: This attribute specifies the name of the policy controlling how long entries will remain in the media index before they are marked as recyclable.
      saveOperations:
        type: string
        description: 'This attribute specifies the save operation instructions in the format: KEYWORD:TOKEN=STATE[;KEYWORD:TOKEN=STATE;...]. This attribute is required if save set attribute of this client contains non-ASCII names. This attribute can also be used to configure VSS saves on the Windows OS.'
      saveSessionDistribution:
        type: string
        description: This attribute sets the threshold for the save session distribution. The client will distribute the save sessions to the next storage node in the storage node affinity list when the overall target sessions or max sessions of all devices on the current storage node is exceeded. The default threshold is max sessions.
        enum:
          - MaxSessions
          - TargetSessions
      saveSetMbt:
        type: array
        items:
          type: string
        description: This attribute specifies the multi-byte transform of the save set names defined for the client. The multi-byte transform is a UTF-8 encoding used to preserve pathnames.
      saveSets:
        type: array
        items:
          type: string
        description: A list of the save sets to be backed up for this client with this schedule.
      schedule:
        type: string
        description: This attribute specifies the backup schedule for client resource.
      scheduledBackup:
        type: boolean
        default: false
        description: This attribute indicates if this client is enabled for scheduled backups.
      shortFilenamesEnabled:
        type: boolean
        description: This attribute determines the status of the short filename processing on the Windows client.
      serverNetworkInterface:
        type: string
        description: This attribute specifies the name of the network interface on the server to be used for saves and recoveries.
      statistics:
        type: array
        items:
          type: string
        description: ' This attribute contains three values: the size of the client''s on-line file index in kilobytes, the number of kilobytes actually used, and the number of entries in the index'
      storageNodes:
        type: array
        items:
          type: string
        description: This attribute specifies an ordered list of storage nodes for the client to use when saving its data.
      storageReplicationPolicyName:
        type: string
        description: The storage replication policy used during backup.
      tags:
        type: array
        items:
          type: string
        description: This attribute contains tags for the clients.
      tenant:
        type: string
        description: The restricted data zone (RDZ) this resource belongs to if it belongs to one.
      vbaHostType:
        type: string
        description: This attribute specifies whether the client is for VBA server or proxy host.
        enum:
          - VBA Server Host
          - VBA Proxy Host
      virtualClient:
        type: boolean
        description: This attribute indicates whether the client is a virtual machine.
  ClientList:
    type: object
    properties:
      clients:
        description: This attribute specifies the information about the client instances.
        type: array
        items:
          $ref: '#/definitions/Client'
      count:
        description: This attribute specifies the number of clients.
        type: integer
        format: int32
      links:
        type: array
        items:
          $ref: '#/definitions/Link'
  ClientInspect:
    type: object
    discriminator: type
    properties:
      type:
        type: string
        description: This attribute specifies the type of the remote agent.
        enum:
          - Filesystem
          - SAP HANA
          - SAPOracle
          - SmartSnap
          - Sybase
          - BBB
          - SQL Server
      debug:
        type: integer
        description: This attribute specifies the debug level. The valid range is from 0 to 9.
      hostname:
        type: string
        description: This attribute specifies the hostname of the client.
      isWindows:
        type: boolean
        description: This attribute specifies if the OS type of the client is Windows.
      server:
        type: string
        description: This attribute specifies the NetWorker server.
      virtual:
        type: boolean
        description: This attribute specifies whether the host is part of a cluster setup or not.
      userName:
        description: This attribute specifies the privileged system or tenant user of the system.
        type: string
      password:
        description: This attribute specifies the password associated with the specified user.
        type: string
  NDMPClientInspectInput:
    type: object
    required:
      - hostname
    properties:
      hostname:
        type: string
        description: This attribute specifies the hostname of the NDMP client.
      userName:
        description: This attribute specifies the user name associated with NDMP client
        type: string
      password:
        description: This attribute specifies the password associated with the specified user.
        type: string
  NASClientInspectInput:
    type: object
    required:
      - hostname
    properties:
      hostname:
        type: string
        description: This attribute specifies the hostname of the NDMP client.
      ndmpUsername:
        description: This attribute specifies the user name associated with NDMP.
        type: string
      ndmpPassword:
        description: This attribute specifies the password associated with NDMP.
        type: string
      nasManagementUser:
        description: This attribute specifies the user name associated with NAS client.
        type: string
      nasManagementPassword:
        description: This attribute specifies the password associated with NAS client.
        type: string
      nasSaveSet:
        description: This attribute specifies the saveset associated with NAS client.
        type: string
  DDClientInspect:
    type: object
    required:
      - hostname
    properties:
      hostname:
        type: string
        description: This attribute specifies the hostname of the data domain device.
      userName:
        description: This attribute specifies the privileged system or tenant user of the data domain device.
        type: string
      password:
        description: This attribute specifies the password associated with the specified user.
        type: string
      fetchCertificates:
        description: This attribute specifies whether the user needs raw certificates from Data Domain to be pulled in
        type: boolean
      managementHost:
        description: 'This attribute specifies the management host. This is an optional attribute. Note: When attribute ''fetchCertificates'' is true, this becomes a mandatory attribute if Data Domain System resource is not already configured with the same.'
        type: string
      managementPort:
        description: 'This attribute specifies the management port. This is an optional attribute. Note: When attribute ''fetchCertificates'' is true, this becomes a mandatory attribute if Data Domain System resource is not already configured with the same.'
        type: string
  AppRemoteClientInspect:
    type: object
    required:
      - hostname
    properties:
      hostname:
        type: string
        description: This attribute specifies the hostname of the client.
  CloneConfiguration:
    type: object
    properties:
      name:
        type: string
        description: The name of this entity is the same as the hostname by default.
      cloneDebugLevel:
        type: integer
        format: int32
        description: 'This attribute enables or disables the Recover Pipe to Save(RPS) Debug Level for clone operation. The allowed range of values are [0-15].'
      enableAms:
        type: boolean
        description: This attribute enables or disables the Automated Multi-Streaming(AMS) for clone operation.
      amsSliceSizeFactor:
        type: integer
        format: int32
        description: 'This attribute sets slice size factor for Automated Multi-Streaming(AMS) clone operation. The allowed range of values are [0-64].'
      amsPreferredSliceCount:
        type: integer
        format: int32
        description: 'This attribute sets number of preferred slices to create for Automated Multi-Streaming(AMS) clone operation. The allowed range of values are [0-64].'
      amsMinConcurrentSliceCount:
        type: integer
        format: int32
        description: 'This attribute sets min number of parallel slices to copy for Automated Multi-Streaming(AMS) clone operation. The allowed range of values are [1-60].'
      amsMaxConcurrentSliceCount:
        type: integer
        format: int32
        description: 'This attribute sets max number of parallel slices to copy for Automated Multi-Streaming(AMS) clone operation. The allowed range of values are [1-60].'
      maxThreadsPerClient:
        type: string
        description: 'This attribute sets max threads per client for clone operation. The allowed range of values are [0-30].'
      maxSavesetsPerThread:
        type: string
        description: 'This attribute sets max savesets per thread for clone operation. The allowed range of values are [0-30].'
      maxClientThreads:
        type: string
        description: 'This attribute sets max client threads for clone operation.  The allowed range of values are [0-30].'
      mmdReservationTimeout:
        type: string
        description: 'This attribute sets mmd reservation time out for clone operation. The allowed range of values are [10-60].'
      enableUseIP:
        type: boolean
        description: This attribute enables or disables the Use IP if for clone operation.
      disableVSR:
        type: boolean
        description: This attribute enables or disables the Virtual Synthetic Replication(VSR) for clone operation.
      rpsImmediateVerbose:
        type: integer
        format: int32
        description: 'This attribute sets immediate verbose for Recover Pipe to Save(RPS) clone operation. The allowed range of values are [0-10].'
      poolSize:
        type: integer
        format: int32
        description: 'This attribute sets pool size for Recover Pipe to Save(RPS) clone operation. The allowed range of values are [100-2000].'
      bufferSize:
        type: integer
        format: int32
        description: 'This attribute sets buffer size for Recover Pipe to Save(RPS) clone operation. The allowed range of values are [64-2048].'
      enableLogPerformanceStats:
        type: boolean
        description: This attribute enables or disables the performance stats logging for Recover Pipe to Save(RPS) clone operation.
  Jukebox:
    type: object
    properties:
      name:
        type: string
        description: This attribute specifies the name of this jukebox.
      comment:
        type: string
        description: This attribute specifies any user defined description of this jukebox or other explanatory remarks.
      description:
        type: string
        description: This attribute specifies the brief description of this jukebox.
      model:
        type: string
        description: This attribute specifies the jukebox model. The model determines how commands are generated to control sequences and also the physical slot number range.
      status:
        type: string
        enum:
          - Enabled
          - Disabled
          - Service
        description: 'This attribute indicates whether the jukebox is available for use. The service mode stops new commands from being submitted to run on this jukebox, while allowing existing commands to cancel.'
      links:
        type: array
        items:
          $ref: '#/definitions/Link'
      controlPort:
        type: string
        description: This attribute specifies the path name of the jukebox's command control port.
      devices:
        type: array
        items:
          type: string
          description: This attribute specifies the names of the jukebox's disk or tape devices. Each entry that appears in this attribute has a corresponding device resource.
      idleDeviceTimeout:
        type: number
        minimum: 0
        maximum: 60
        description: This attribute specifies the number of hours between updates to SmartMedia's database.
      mediaUpdateInterval:
        type: number
        minimum: 1
        maximum: 24
        description: This attribute specifies the number of hours between updates to SmartMedia's database.
      availableSlots:
        type: array
        items:
          type: string
          description: This attribute specifies the names of the jukebox's disk or tape devices.
      serialnumbers:
        type: array
        items:
          type: string
          description: This attribute specifies the serial number of this tape library.
      commands:
        type: array
        items:
          type: string
          description: This attribute specifies either the command line of the operation or a description of the operation to be performed.
      intervalAfterEjectInSeconds:
        type: number
        description: This attribute specifies the number of seconds for a jukebox to sleep after an eject operation.
      cleaningDelayInSeconds:
        type: number
        description: This attribute specifies the number of seconds for a jukebox to sleep before attempting to unload a cleaning cartridge.
      unloadSleepInSeconds:
        type: number
        description: This attribute specifies the number of seconds for a jukebox to sleep before attempting to unload a given cartridge.
      loadSleepInSeconds:
        type: number
        description: This attribute specifies the  the number of seconds for a jukebox to sleep after a load operation.
      depositTimeoutInSeconds:
        type: number
        description: This attribute specifies the number of seconds for a jukebox to wait for a slot to be deposited in the mail slot before it timing out.
      withdrawTimeoutInSeconds:
        type: number
        description: This attribute specifies the number of seconds for a jukebox to wait for a slot to be withdrawn to a mail slot before it times out.
      portPollingPeriodInSeconds:
        type: number
        description: This attribute specifies the number of seconds for a jukebox to wait before polling a mail slot to check for updated status.
      jukeboxFeatures:
        type: array
        items:
          type: string
          enum:
            - ElementsStatus
            - VolumeTags
            - Barcode
            - AutoEject
            - TwoSidedJukeBox
            - DoorLock
            - InitInletReqd
            - NoTransportSourceDest
            - HasRange
            - NeedAlign
            - IesNoBarcode
            - InternalPorts
            - Display
            - AutoCleaningCartridgeUnload
            - CleaningCartridgeEject
            - StackerImport
            - PolledImport
            - StackerExport
            - MultiStackExport
            - ReadElementUnloadFail
            - TrustComplaintJukeBox
            - NoInitElementStatus
          description: This attribute specifies the features supported by this jukebox from the specified list.
      maxParalellism:
        type: number
        description: This attribute specifies the default volume pool to use when labeling.
      operationVolumePool:
        type: string
        description: This attribute specifies the pool from which a volume may be recycled when re-labeling.
      operationSourcePool:
        type: string
        description: This attribute specifies the pool from which a volume may be recycled when re-labeling.
      volumes:
        type: array
        items:
          type: string
          description: This attribute specifies the volumes in the jukebox. These are obtained when a volume is labeled or when an inventory is done on the jukebox.
      deviceHardwareIds:
        type: array
        items:
          type: string
          description: This attribute specifies the identfiers of devices in the jukebox.
      operationBarcodes:
        type: array
        items:
          type: string
          description: This attribute specifies the barcodes on which the current operation is performed.
      volumeIds:
