        description: This attribute specifies the operation being performed on the device. This is a read-only attribute.
        type: string
        enum:
          - Idle
          - Write
          - Read
          - VerifyLabel
          - Label
          - Eject
          - SettingUpForWriting
          - SettingUpForReading
          - ReadyForReading
          - ReadyForWriting
      minorMode:
