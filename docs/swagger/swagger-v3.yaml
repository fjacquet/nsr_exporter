        type: array
        description: This attribute contains information about the unconfigured libraries.
        items:
          $ref: '#/definitions/UnconfiguredLib'
  UnconfiguredLib:
    type: object
    properties:
      administrators:
        description: 'This attribute specifies the list which contains users or groups that are allowed to add, delete, and update all NetWorker resources.'
        type: array
        items:
          type: string
      controlPorts:
        description: This attribute is a list of the control ports that the various storage nodes reported using to communicate with this library.  There may be more than one port for any given storage node due to the existence of multiple communications channels between the storage node and the library.
        type: array
        items:
          type: string
      descriptions:
        description: This attribute is a list of descriptions of the library for each storage node that can see the library. They are usually based on inquiry data and SCSI addresses.
        type: array
        items:
          type: string
      driveAddresses:
        description: 'This attribute is a list of the actual element addresses for any drives that are present on the library. They are usually contiguous, but that is no longer a requirement for use with NetWorker.'
        type: array
        items:
          type: string
      driveBase:
        description: This attribute specifies the base element address of the drives in this tape library. This attribute is the lowest SCSI element address for any of the drives in the library.
        type: array
        items:
          type: string
      driveCount:
        description: This attribute is the number of drives that the library reports that it has.
        type: array
        items:
          type: string
      driveData:
        type: array
        items:
          $ref: '#/definitions/LibDriveData'
      driveIds:
        description: This attribute is a list of the tape drives' identifiers returned to us by the library.  These are used to match up the drives with the various access paths (i.e. tape drive device files) on all of the storage nodes that can see the drives in this library.
        type: array
        items:
          type: string
      features:
        description: This attribute is a list of NetWorker's internal 'features' that are applicable for this library.
        type: array
        items:
          type: string
          enum:
            - ElementsStatus
            - VolumeTags
            - Barcode
            - AutoEject
            - TwoSidedJukeBox
            - DoorLock
            - InitInletReqd
            - NoTransportSourceDest
            - HasRange
            - NeedAlign
            - IesNoBarcode
            - InternalPorts
            - Display
            - AutoCleaningCartridgeUnload
            - CleaningCartridgeEject
            - StackerImport
            - PolledImport
            - StackerExport
            - MultiStackExport
            - ReadElementUnloadFail
            - TrustComplaintJukeBox
            - NoInitElementStatus
      hostname:
        description: This attribute specifies hostname of library.
        type: string
      ieBase:
        description: This attribute is the lowest SCSI element address for the import/export elements in this library.
        type: array
        items:
          type: string
      ieCount:
        description: This attribute is the number if import/export elements that the library reports that it contains.
        type: array
        items:
          type: string
      libraryTypes:
        description: This attribute is a listing of the connection method(s) used to communicate with this library.  There is one entry in the list for each storage node that can see the library.
        type: array
        items:
          type: string
          enum:
            - SCSI
            - NDMP
            - SILO
      links:
        type: array
        items:
          $ref: '#/definitions/Link'
      mediaTransportBase:
        description: This attribute is the lowest SCSI element address for the medium transport element(s) in this library.
        type: array
        items:
          type: string
      mediaTransportCount:
        description: 'This attribute is the number of medium transports (a.k.a. robot, gripper, the thing that moves the tapes around) that the library reports.  This is usually only one.'
        type: array
        items:
          type: string
      model:
        description: This attribute is the model name used internally by NetWorker. Most often it will be 'Standard SCSI Jukebox' which is the internal name for a library that behaves just as described in the SCCI Medium Changer specification.
        type: array
        items:
          type: string
      name:
        description: 'This attribute is an automatically generated unique name, usually derived from the SCSI inquiry data for the library along with serial number information also retrieved from the library.'
        type: string
      referenceNames:
        description: This attribute is a listing of the names that will be used to describe this library for the various storage nodes that are able to see it.
        type: array
        items:
          type: string
      serialNumber:
        description: This attribute is the serial number of the library itself.
        type: array
        items:
          type: string
      siloLibrary:
        description: This attribute is the filename of the software library that is used by NetWorker to communicate with a silo controller (if this is a silo-type library).
        type: array
        items:
          type: string
      slotBase:
        description: This attribute is the lowest SCSI element address for the slots in this library.
        type: array
        items:
          type: string
      slotCount:
        description: This attribute is the number of slots (SCSI storage elements) that the library reports that it contains.
        type: array
        items:
          type: string
      storageNodes:
        description: This attribute is a list of the storage nodes that have reported to the NetWorker server that they were able to communicate with this library.
        type: array
        items:
          type: string
      toBeConfiguredDevices:
        description: This attribute is a working list of devices that will be configured during the autoconfig process. (It will change during the configuration process)
        type: array
        items:
          type: string
      unConfiguredDevices:
        description: This attribute is a list of devices that are not yet matched to device access paths by the autoconfig process. (It will change during the configuration process)
        type: array
        items:
          type: string
