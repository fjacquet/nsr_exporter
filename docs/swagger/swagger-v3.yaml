  Schedule:
    type: object
    properties:
      levels:
        type: array
        description: 'This attribute specifies the sequence of save levels making up the schedule. One entry is used for each day of the schedule. The valid levels are "full", "incr", "incr_synth_full", "skip", "txnlog", and the number "1". '
        items:
          type: string
          enum:
            - '1'
            - full
            - incr
            - incr_synth_full
            - skip
            - txnlog
            - exec
      activityType:
        type: string
        enum:
          - Backup
          - Execute
          - Server-Backup
          - Vmware
      comment:
        type: string
        description: This attribute is provided for the administrator to keep any explanatory remarks or supplementary information about the schedule.
      flag:
        type: string
        description: This read-only attribute specifies whether the schedule is a default or editable schedule.
      name:
        type: string
        description: This attribute specifies the schedule’s name. The schedule is referred to by its name in client resources.
      overrides:
        type: array
        description: 'This attribute specifies a list of actions and dates overriding the actions specified in the levels attribute. The format of the override specification is action date. Action must be one of "full", "txnlog", "incr_synth_full", "incr", "skip", or the number "1". '
        items:
          $ref: '#/definitions/ScheduleOverride'
          type: object
      period:
        type: string
        description: This attribute specifies the length of the schedule’s period. It may be either "Week" or "Month". "Week" schedules repeat every 7 days and start on Sunday. "Month" schedules start over at the first of each month. The default is "Week".
      resourceId:
        $ref: '#/definitions/ResourceId'
