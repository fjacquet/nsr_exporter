      deviceConnectivityCheckInterval:
        description: This attribute displays the polling interval for device connectivity check in minutes.
        type: integer
        format: int32
      deviceSharingMode:
        description: This attribute specifies the device sharing mode at the server level; used when device sharing mode is not set at storage node level. Refer to man page nsr_storage_node_resource.
        type: string
        enum:
          - NoSharing
          - MaximalSharing
          - ServerDefault
      disableRpsClone:
        description: This attribute is to enable or disable the RPS (Recover Pipe to Save) implementation for clone operations.
        type: boolean
