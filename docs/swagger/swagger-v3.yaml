      tenant:
        type: string
        description: This attribute specifies the name of the restricted data zone (RDZ) to which the storage node belongs.
      typeOfStorageNode:
        type: string
        description: This attribute specifies the storage node type from the predefined list.
        enum:
          - SCSI
          - NDMP
          - SILO
      usePersistentNames:
        type: boolean
        description: This attribute indicates whether NetWorker should use any available persistent device names when it searches for tape drives and medium changers.
      version:
        type: string
        description: This attribute specifies the storage node version. This is a read-only attribute.
      serverNetworkInterface:
        description: This attribute specifies the name of the network interface on the storage node.
        type: string
      connectivityCheckEnabled:
        description: This attrbute enables or disables snode device connectivity check feature.
        type: boolean
      unconfigDeviceNames:
        description: This attribute specifies the device names that were discovered during scan on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      connectivityCheckInterval:
        description: This attribute specifies the polling interval for device connectivity check in minutes.
        type: integer
      unconfigDeviceDescriptions:
        description: This attribute specifies the descriptions of the devices that were discovered during scan on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      unconfigDeviceModelTypes:
        description: This attribute specifies the model of the devices that were discovered during scan on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      unconfigDeviceSerialNumbers:
        description: This attribute specifies the serial numbers of the devices that were discovered during scan on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      unconfigDeviceWormSupport:
        description: This attribute specifies the WORM capabilities of the devices that were discovered by auto-detect during the last scan. This is a read-only attribute.
        type: string
      unconfigDeviceLibraryNames:
        description: This  attribute specifies the library names to which the devices that were discovered during scan belong. This is a read-only attribute.
        type: array
        items:
          type: string
      unconfigLibraryNames:
        description: This attribute specifies the unique unconfigured library names that were discovered during device scannning on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      unconfigLibraryReferences:
        description: This attribute specifies the unique unconfigured library names that were discovered during device scannning on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      unconfigLibraryDescriptions:
        description: This attribute specifies the descriptions of the unconfigured libraries that were discovered during the last device scannning on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      unconfigLibraryModels:
        description: This attribute specifies the model of the unconfigured libraries that were discovered during the last device scannning on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      unconfigLibrarySerialNumbers:
        description: This attribute specifies the serial number of the unconfigured libraries that were discovered during the last device scannning on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      unconfigLibraryControlPorts:
        description: This attribute specifies the control port of the unconfigured libraries that were discovered during the last device scannning on the storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      visibleSiloControllers:
        description: This attribute specifies all the Silo controllers being tested or configured as visible from this storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      siloControllerTypes:
        description: This attribute specifies all the Silo controller types being tested or configured as visible from this storage node. This is a read-only attribute.
        type: array
        items:
          type: string
      siloNames:
        description: This attribute specifies the user assigned Silo library names during silo auto configuration. This is a read-only attribute.
        type: array
        items:
          type: string
      siloDasClientNames:
        description: This attribute specifies the Das client names during silo auto configuration. This is a read-only attribute.
        type: array
        items:
          type: string
      siloConnectionStatus:
        description: This attribute indicates the status of the Silo connections being tested.Each silo connection status is corresponding to the visible silo controllers defined. This is a read-only attribute.
        type: array
        items:
          type: string
  StorageNodeList:
