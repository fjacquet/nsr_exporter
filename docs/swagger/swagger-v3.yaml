swagger: '2.0'
info:
  description: 'The NetWorker REST API is available in the following base URI:<br>&nbsp;&nbsp;https://{nw-server-hostname}:9090/nwrestapi/v3<br><br>There is one URI group: {baseuri}/global<br>&nbsp;<br>To access client resources, you must use the URI group, followed by the associated tag. For example,<br>https://{nw-server-hostname}:9090/nwrestapi/v3/global/{id}<br>&nbsp;&nbsp;<br>The {id} corresponds to the Resource tag.<br><br>'
  version: 19.13.0
  title: NetWorker REST API RESOURCE REFERENCE
  contact:
    name: REST API TEAM
  license:
    name: Copyright © 1990-2025 Dell Inc. or its subsidiaries. All rights reserved.
    url: 'https://www.dellemc.com'
basePath: /nwrestapi/v3/global
securityDefinitions:
  apiSecurity:
    type: basic
security:
  - apiSecurity: []
tags:
  - name: alerts
  - name: queue
  - name: backups
  - name: clients
  - name: devices
  - name: datadomain
  - name: directives
  - name: inspect
  - name: jobs
  - name: jukebox
  - name: labels
  - name: licenses
  - name: lockbox
  - name: notifications
  - name: smartscale
  - name: pools
  - name: probes
  - name: protectiongroups
  - name: protectionpolicies
  - name: recovers
  - name: recoverapps
  - name: rules
  - name: server
  - name: sessions
  - name: storagenodes
  - name: tenants
  - name: timepolicies
  - name: unconfiguredlibraries
  - name: vmware
  - name: volumes
parameters:
  queryFilterParam:
    in: query
    name: q
    type: string
    required: false
    description: 'The parameter "q" represents the <b>Query filter</b>. Use this parameter to specify an "attribute matching a value". For example, /endpoint?q=AttributeName:Value filters the result to resources with AttributeName=Value. To specify multiple values, use the "and" delimiter, for example, /endpoint?q=AttributeName1:Value1 and AttributeName2:Value2.'
  fieldListFilterParam:
    in: query
    name: fl
    type: string
    required: false
    description: 'The parameter "fl" represents the <b>Field List filter</b>. Use this parameter to specify the fields (or attributes) to be shown in the response, as in fl=field1,field2. This parameter setting helps to limit the information in the response. If not specified, all the fields are shown. To use query filter (q) and field list filter (fl) concurrently, separate both filters with the "&" delimiter, as in /endpoint?q=AttributeName1:Value & fl=AttributeName2.'
  queryFilterTimeRangeParam:
    in: query
    name: q
    type: string
    required: false
    description: 'The parameter "q" represents the <b>Query filter</b>. Use this parameter to specify an "attribute matching a value" or an "attribute supports time range" on which to filter the results. Either exact match of the entered value or entered time range is supported. For example, /endpoint?q=AttributeName:Value filters the result to resources with AttributeName=Value and /endpoint?q=AttributeName:["start" TO "end"] filters the result to resources with AttributeName value between specified start and end date-time. Time range filer can also specify as /endpoints?q=AttributeName:["N hours"] filters the result to resources with AttributeName value as last 24 hours. Supported time unit values are hours or days. To specify multiple values, use the "and" delimiter, for example, /endpoint?q=AttributeName1:Value1 and AttributeName2:Value2.'
  pageSizeQueryParam:
    in: query
    name: PageSize
    type: string
    required: false
    description: 'The PageSize parameter specifies the default page size for the API. Use this parameter to specify the number of resources to be returned per page. Based on the setting, the server returns a set of pages with the specified number of items per page. By default, all query results are displayed on one page. Set the PageSize parameter to a value greater than 0.'
  pageNumberQueryParam:
    in: query
    name: PageNumber
    type: string
    required: false
    description: The PageNumber parameter specifies the page number.
paths:
  /alerts:
    get:
      tags:
        - alerts
      summary: Returns the most recent alert messages.
      description: This operation can be used to list the outstanding alert messages. The query parameters can be used to filter the response.
      operationId: getAlerts
      produces:
        - application/json
      parameters:
        - $ref: '#/parameters/queryFilterParam'
        - $ref: '#/parameters/fieldListFilterParam'
      responses:
        '200':
          description: Information about the alerts are retrieved successfully.
          schema:
            $ref: '#/definitions/AlertList'
          examples:
            application/json:
              alerts:
                - category: server
                  message: Process nsrworkflow crashed. New core file found on server RHEL67_base. Check daemon.raw for details.
                  priority: critical
                  timestamp: '2018-10-22T10:00:00-04:00'
              count: 1
        '400':
          $ref: '#/definitions/BadRequestErrorResponse'
        '401':
          $ref: '#/definitions/AuthNErrorResponse'
        '404':
          $ref: '#/definitions/NotFoundErrorResponse'
        '500':
          $ref: '#/definitions/InternalServerErrorResponse'
  '/queue/{queueId}':
    get:
      tags:
        - queue
      summary: Returns a specific task information.
      description: This operation can fetch the information about the specific task in the task queue.
      operationId: getTaskInfo
      produces:
        - application/json
      parameters:
        - name: queueId
          in: path
          description: The attribute represents the ID of the task in the task queue.
          required: true
          type: string
      responses:
        '200':
          description: Returns the task status. This is the response code until the task completes.
          schema:
            $ref: '#/definitions/QueueTaskStatus'
          examples:
            application/json:
              description: Task is in-progress.
              error:
                code: 32039
                text: Task is associated with job ID 32039.
              startTime: 'Tue Mar 10 02:01:48 PDT 2020'
              state: Running
        '303':
          description: Information of the specific task is retrieved successfully.
          schema:
            $ref: '#/definitions/EmptyResponse'
          headers:
            location:
              description: The URI corresponding to task.
              type: string
        '400':
          $ref: '#/definitions/BadRequestErrorResponse'
        '401':
          $ref: '#/definitions/AuthNErrorResponse'
        '404':
          $ref: '#/definitions/NotFoundErrorResponse'
        '500':
          $ref: '#/definitions/InternalServerErrorResponse'
  /auditlogconfig:
    get:
      deprecated: true
      tags:
        - server
      summary: Returns the security audit log settings.
      description: This endpoint is deprecated. Please use '/auditlogconfigs' instead.
      operationId: getAuditLogConfig
      produces:
        - application/json
      responses:
        '200':
          description: Information about the audit log configuration is retrieved successfully.
          schema:
            $ref: '#/definitions/AuditLogConfiguration'
          examples:
            application/json:
              administrators:
                - 'user=root,host=rhel67_base'
                - 'user=administrator,host=rhel67_base'
                - 'user=system,host=rhel67_base'
                - 'user=nsrnmc,host=rhel67_base'
              auditLogFilePath: /nsr/logs
              auditLogHostname: rhel67_base
              auditLogMaxFileSizeInMB: 2
              auditLogMaxFileVersion: 0
              auditLogRenderedService: None
              auditLogSeverity: Error
              name: rhel67_base_sec_audit.raw
              resourceId:
                id: 5.0.171.113.0.0.0.0.99.124.205.91.10.118.244.205
                sequence: 1
        '400':
          $ref: '#/definitions/BadRequestErrorResponse'
        '401':
          $ref: '#/definitions/AuthNErrorResponse'
        '404':
          $ref: '#/definitions/NotFoundErrorResponse'
        '500':
          $ref: '#/definitions/InternalServerErrorResponse'
    put:
      deprecated: true
      tags:
        - server
      summary: Updates the security audit log settings.
      description: 'This attribute can be used to update the security audit log settings.<br><br>NetWorker enables security audit logging by default and each NetWorker client is automatically configured. Any changes in audit logging settings will be automatically communicated to the NetWorker clients. '
      operationId: putAuditLogConfig
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - in: header
          name: Content-Type
          description: This header must specify the content type of request payload as application/json.
          required: true
          type: string
        - in: body
          name: auditLogConfig
          description: Audit log settings for update.
          required: true
          schema:
            $ref: '#/definitions/AuditLogConfiguration'
          x-examples:
            application/json:
              auditLogMaxFileSizeInMB: 8
      responses:
        '204':
          description: Security audit log settings is updated successfully.
          schema:
            $ref: '#/definitions/EmptyResponse'
        '400':
          $ref: '#/definitions/BadRequestErrorResponse'
        '401':
          $ref: '#/definitions/AuthNErrorResponse'
        '403':
          $ref: '#/definitions/AuthZErrorResponse'
        '404':
