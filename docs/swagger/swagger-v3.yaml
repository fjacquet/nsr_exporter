        type: string
      fileServer:
        description: The attributes specifies the hostname of file server that is the NFS-mountable or CIFS-mountable to a NetWorker storage node. The attribute is not applicable on usage of local disk on a NetWorker storage node.
        type: string
      remoteUser:
        description: 'This attribute is the name of the user on the share server. It is not applicable when using local disk on a NetWorker storage node. It is recommended that the numeric user id (UID) of that user is also specified along with the username, in the format username:uid.'
        type: string
      password:
        description: This attribute specifies the password associated with the user used to connect to the share server. It is not applicable when using local disk on a NetWorker storage node.
        type: string
  StorageNodeFolderCreate:
    type: object
    properties:
      path:
        description: This attribute specifies the path on a local disk of a remote storage node or the path of the mountpoint or the export path on the share server. This attribute is to be provided even when performing file level operations on root directories on local as well as on file servers.
        type: string
      name:
        description: This attribute specifies the name of the folder to be created.
        type: string
      fileServer:
        description: The attributes specifies the hostname of file server that is the NFS-mountable or CIFS-mountable to a NetWorker storage node. The attribute is not applicable on usage of local disk on a NetWorker storage node.
        type: string
      remoteUser:
        description: 'This attribute is the name of the user on the server. It is not applicable when using local disk on a NetWorker storage node.  It is recommended that the numeric user id (UID) of that user is also specified along with the username, in the format username:uid.'
