      saveSessionDistribution:
        description: This attribute specifies the threshold for the save session distribution for all clients. The clients will distribute the save sessions to the next storage node in their storage node affinity lists when the overall target sessions or max sessions for all devices on the current storage node is exceeded. Max sessions is the default threshold but the value in the client save session distribution attribute overwrites the max sessions value.
