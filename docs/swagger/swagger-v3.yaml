          - Reading
          - Writing
          - Rewinding
          - MovingForward
          - Error
          - Done
          - WritingEof
          - FindingEom
          - MovingBackward
      unlabeledVolumeLoaded:
        description: This attribute records whether an unlabeled volume has been loaded into the device. This attribute is applicable only for non-jukebox devices that have the 'auto media management' attribute enabled. This is a read-only attribute.
        type: boolean
      autoDetectId:
        description: This attribute specifies the internal identifier for auto-detected device. This is a read-only attribute.
        type: string
      volumeDefaultCapacity:
        description: 'This attribute specifies the default capacity of the volumes that are labeled by the device. The units can be KiloBytes, MegaBytes or GigaBytes, for example, ''150 MB'' or ''5 GB''.'
        type: string
      aftdPercentageCapacity:
        description: 'This attribute applicable only to AFTD volumes, specifies the percentage of the capacity of the underlying filesystem to be used by the AFTD volume. Allowed values range from 0 to 100.'
        type: integer
      exportPath:
        description: 'This attribute specifies the path relative to a base path that has been NFS exported by the Data Domain, for example, ''7678/exported-dir''. The base path is the path to the directory that contains the Data Domain MTree, for example, ''/data/col1''.'
        type: string
      deviceBlockSize:
        description: This attribute specifies the size of the transfers that are used when writing to or reading from the device.
        type: string
        enum:
          - 32KB
          - 64KB
          - 96KB
          - 128KB
          - 160KB
          - 192KB
          - 224KB
          - 256KB
          - 384KB
          - 512KB
          - 640KB
          - 768KB
          - 896KB
          - 1024KB
          - 2048KB
      deviceFileSize:
        description: This attribute specifies the number of blocks that are written to a tape before a filemark is written.
        type: string
      deviceLoadTime:
        description: This attribute specifies the number of seconds that we will try to open a tape device when a tape is loaded.
        type: string
      deviceEjectTime:
        description: This attribute specifies the number of seconds that we will wait after sending an unload command to wait for the drive to fully eject the tape.
        type: string
      devicePollInterval:
        description: This attribute specifies the number of seconds that we will wait between testing a drive to see if it is ready when loading a tape.
        type: string
      deviceMinLoadTries:
        description: This attribute specifies the minimum number of attempts we will make to open a drive to see if it is ready when loading a tape.
        type: string
      deviceDefaultCapacity:
        description: 'This attribute specifies the default capacity of the volumes that are labeled by the device. The units can be MegaBytes or GigaBytes, for example, ''150 MB'' or ''5 GB''.'
        type: string
      deviceTapeFlags:
        description: 'This attribute specifies the internal flags used to control how we handle a tape drive. Allowed values are TAPE, NOEOM, PHYSREC, SIZED, NOBSF, FILE, FILESYS, 32K. You should only use this attribute if you have been instructed to by DELL EMC Technical Support, as misuse can cause the loss of data on any tapes that get loaded into the drive when this attribute is set to anything other than the default empty value.'
        type: string
      reserveRelease:
        description: This attribute indicates if reserve/release should be used for the device. CDI must be set to 'SCSI' Commands for reserve/release to be used.
        type: string
        enum:
          - None
          - Simple
          - Persistent
          - Persistent_APTPL
      persistentReserveKey:
        description: 'This attribute specifies the 64-bit value that will be used during a persistent reservation command for the device. If blank, a default value of ''NetWorkr'' will be used.  Value can be an 8-character text string (first 8 characters will be used) or an explicit 64-bit value specified as in ''0x123456789abcdef0''.'
        type: string
      accessWeight:
        description: This attribute specifies the load distribution among drives in a jukebox. Changes to this attribute are propagated to all devices that have the same 'hardware ID' value.
        type: integer
      maxConsecutiveErrors:
        description: This attribute specifies the maximum number of consecutive errors allowed before the device is automatically disabled.
        type: integer
      saveMountTimeout:
        description: This attribute specifies the timeout value of an initial save mount request for the storage node on which the device resides.
        type: integer
      saveLockout:
        description: 'This attribute specifies the number of minutes a storage node will be locked from receiving save assignments, after it times out from a save mount request.'
        type: integer
      idleDeviceTimeout:
        description: This attribute specifies the number of minutes before an idle device is unmounted. This attribute only applies to jukebox devices.
        type: integer
      autoRecoverDtf:
        description: This attribute specifies how many times NetWorker should automatically issue the device-specific RECOVER command if a DTF tape needing recovery is loaded. Maximum allowed is 4 attempts. This is only used for Sony DTF and DTF-2 tape drives.
        type: string
        enum:
          - None
          - 4 Attempts
      jukeboxDevice:
        description: This attribute specifies if the media device is part of a jukebox device.
        type: string
        enum:
          - 'Yes'
          - 'No'
          - Unknown
      volumeExpiration:
        description: 'This attribute specifies the expiration date of the volume in the format E MMM dd HH:mm:ss yyyy (Thu Jun 02 17:23:09 2022) that is currently being labeled, or the result of a ''Verify Label'' operation.  The default value, 2 years, is reset each time the volume is relabeled.'
        type: string
      sharedDevices:
        description: This attribute enables or disables all devices with the same hardware id.
        type: string
        enum:
          - EnableAll
          - DisableAll
          - ServiceAll
          - Done
