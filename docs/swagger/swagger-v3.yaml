        description: This attribute determines whether Disk Space Monitoring Feature is enabled at Data Zone level.
        type: boolean
      emailAddress:
        description: This attribute specifies part of the information required for printing the license enabler.
        type: string
      fax:
        description: This attribute specifies part of the information required for printing the license enabler.
        type: string
      hostname:
        description: ' This attribute gives the hostname of the machine on which the service that controls these resources is running. It is used internally and cannot be changed by the administrator.'
        type: string
      jobInactivityTimeout:
        description: 'This attribute specifies the global setting for the number of minutes since a job has been heard from, after which it will be declared inactive and will be terminated. This setting is enforced by nsrjobd and replaces environment variable NSR_UNRESPONSIVE_JOB_TIMEOUT. Unlike the group inactivity timeout which applies only to save processes maintaining connection to nsrmmd, this timeout applies to all processes throughout runtime. For example, if a save process were to hang in argument processing, group inactivity setting would never trigger its termination. However, if this attribute is set, it will result in terminating such a suspended process after the number of minutes set in this attribute has passed. An empty string or a value of 0 indicates that no such timeout is in effect.'
        type: integer
        format: int32
      jobsdbRetentionInHours:
        description: This attribute specifies the minimum time in hours to keep jobs records in the jobs database.
        type: integer
        format: int32
