replicaCount: 1

image:
  repository: ghcr.io/fjacquet/nsr_exporter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 9447

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

volumes: []
# - name: config-templated
#   emptyDir:
#     sizeLimit: 16Mi
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

volumeMounts: []
# - mountPath: /app/config
#   name: config-templated
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

extraArgs: []

existingSecret: ""

# Inline exporter config, rendered into a Secret as config.yaml and mounted at
# /etc/nsr_exporter/config.yaml. The exporter is started with
# --config /etc/nsr_exporter/config.yaml (matches Dockerfile CMD).
# Replace placeholder credentials with real values or reference them via env vars.
config: |
  server:
    host: "0.0.0.0"
    port: "9447"
    uri: "/metrics"
    logName: ""
  collection:
    interval: "5m"
    timeout: "60s"
    backupWindow: "24h"
  systems:
    - name: nsr-prod-01
      host: "https://networker-prod-01.local:9090"
      username: "USERNAME"
      password: "PASSWORD"
      insecureSkipVerify: true

env: []
# - name: NSR1_USERNAME
#   valueFrom:
#     secretKeyRef:
#       name: nsr-credentials
#       key: username
# - name: NSR1_PASSWORD
#   valueFrom:
#     secretKeyRef:
#       name: nsr-credentials
#       key: password

deploymentAnnotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "9447"

prometheus:
  monitor:
    enabled: false
    additionalLabels: {}
    interval: 15s
    namespace: []
    metricRelabelings: []
    relabelings: []
    targetLabels: []

  rules:
    enabled: false
    additionalLabels: {}
    namespace: ""
    additionalRules: []

  scrapeConfig:
    enabled: false
    additionalLabels: {}
    namespace: ""
    interval: 60s
    scrapeTimeout: 55s
    metricRelabelings: []
    relabelings: []
