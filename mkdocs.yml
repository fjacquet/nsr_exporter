site_name: nsr_exporter
site_description: Prometheus + OTLP exporter for Dell EMC NetWorker
repo_url: https://github.com/fjacquet/nsr_exporter
repo_name: fjacquet/nsr_exporter

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

# `search` must be listed explicitly once a plugins block exists (it is only
# implicit when no plugins are configured). awesome-pages auto-discovers pages
# from the directory tree so curated sections below stay in sync with disk.
plugins:
  - search
  - awesome-pages

nav:
  - Home: index.md
  - Metrics: metrics.md
  - Dashboards: dashboards.md
  - Deployment:
      - Docker: deployment/docker.md
  # `...` (awesome-pages rest token) pulls in everything not listed above —
  # i.e. the docs/adr/ directory, titled and ordered by docs/adr/.pages. Drop a
  # new ADR file in and it appears automatically; no mkdocs.yml edit required.
  - ...

# Keep working notes and the reference PDFs out of the published site so
# `mkdocs build --strict` doesn't fail on pages that aren't part of the nav.
exclude_docs: |
  brainstorm/
  superpowers/
  *.pdf

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables

extra:
  version: v0.12.2
